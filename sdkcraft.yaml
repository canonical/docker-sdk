name: docker-ce
adopt-info: docker-ce
summary: Docker container runtime
description: |
  This SDK provides the Docker container runtime for building and running
  container images inside a workshop. Docker is installed from the official
  Docker apt repository. Docker configuration and credentials are persisted
  on the host across workshop updates.
license: Apache-2.0
website: https://github.com/canonical/docker-sdk
platforms:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

plugs:
  docker-config:
    interface: mount
    workshop-target: /home/workshop/.docker

parts:
  docker-ce:
    plugin: nil
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
