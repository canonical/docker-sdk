name: Build SDK

on:
  pull_request:
    branches:
      - latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@main
    strategy:
      matrix:
        include:
          - runs-on: [self-hosted, linux, jammy, x64, xlarge]
          # disable due to the lack of KVM support
          # - runs-on: [self-hosted, linux, jammy, ARM64, xlarge]
    with:
      runs-on: ${{ toJSON(matrix.runs-on) }}
